<footer class="footer">
    <div class="footer__container">

        <div class="footer__brand">
            <h3 class="footer__name">Liangalbin9@gmail.com</h3>
            <p class="footer__role">Software Engineer</p>
        </div>

        <nav class="footer__nav" aria-label="Navegación del footer">
            <ul>
                @for (link of quickLinks(); track link.fragment) {
                <li>
                    <button type="button" (click)="scrollTo(link.fragment)">
                        {{`TOOLBAR.${link.label}` | translate}}
                    </button>
                </li>
                }
            </ul>
        </nav>

        <div class="footer__social">
            @for (social of socialLinks(); track social.name) {
            <a [href]="social.url" target="_blank" rel="noopener noreferrer" [attr.aria-label]="social.name"
                class="footer__social-link">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                    <path [attr.d]="social.icon"></path>
                </svg>
            </a>
            }
        </div>

    </div>

    <div class="footer__bottom">
        <p>&copy; {{ currentYear() }} Albin Liang Cen.</p>

        <p class="footer__disclaimer">
            {{ "FOOTER.AI_DISCLAIMER" | translate }} </p>
    </div>
</footer>
