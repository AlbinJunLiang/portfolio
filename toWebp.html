<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PNG a WebP</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            text-align: center;
        }

        input, button {
            margin: 10px;
            padding: 10px;
        }

        img {
            max-width: 300px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h2>Convertir PNG a WebP</h2>

    <input type="file" id="inputImage" accept="image/png">

    <br>

    <label>
        Calidad:
        <input type="range" id="quality" min="0.1" max="1" step="0.1" value="0.8">
    </label>

    <br>

    <button onclick="convertToWebp()">Convertir</button>

    <p id="result"></p>

    <img id="preview">

    <script>
        function convertToWebp() {
            const input = document.getElementById('inputImage');
            const quality = document.getElementById('quality').value;

            if (!input.files.length) {
                alert('Selecciona una imagen PNG');
                return;
            }

            const file = input.files[0];

            const reader = new FileReader();

            reader.onload = function(event) {
                const img = new Image();

                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');

                    canvas.width = img.width;
                    canvas.height = img.height;

                    ctx.drawImage(img, 0, 0);

                    canvas.toBlob(function(blob) {

                        const url = URL.createObjectURL(blob);

                        const link = document.createElement('a');
                        link.href = url;
                        link.download = file.name.replace('.png', '.webp');
                        link.click();

                        document.getElementById('preview').src = url;

                        document.getElementById('result').innerText =
                            'Convertido correctamente';

                    }, 'image/webp', Number(quality));
                };

                img.src = event.target.result;
            };

            reader.readAsDataURL(file);
        }
    </script>

</body>
</html>
